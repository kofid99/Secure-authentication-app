name: Secure Auth API Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir --upgrade -r requirements.txt

      - name: Run flake8 linter
        run: |
          pip install flake8
          flake8 . --count --max-line-length=120 --ignore=E265,E302,E303,E305,W291,W293,E402

      - name: Echo pipeline works
        run: echo "✅ Pipeline is live"

      - name: Run Bandit SAST
        run: |
          pip install bandit
          bandit -r . -ll --exclude ./.venv,./tests

      - name: Build Docker image
        run: |
          docker build -t secure-auth-api:v1 .

      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-auth-api:v1
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push image to Docker Hub
        run: |
          docker tag secure-auth-api:v1 owurakofi/secure-auth-api:latest
          docker push owurakofi/secure-auth-api:latest
      
   
